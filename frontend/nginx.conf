server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every non-file route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
