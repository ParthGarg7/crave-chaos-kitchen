# Niramay backend as a K3s Deployment.
# Uses the niramay ServiceAccount for K3s API access.
# K3S_ENABLED=true activates real K3s healing strategies.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: niramay-backend
  namespace: selfhealing
  labels:
    app: niramay-backend
    component: niramay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: niramay-backend
  template:
    metadata:
      labels:
        app: niramay-backend
        component: niramay
    spec:
      serviceAccountName: niramay
      containers:
        - name: niramay-backend
          image: niramay-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: K3S_ENABLED
              value: "true"
            - name: K3S_IN_CLUSTER
              value: "true"
            - name: K3S_NAMESPACE
              value: "selfhealing"
            - name: K3S_CRAVE_DEPLOYMENT_NAME
              value: "crave-backend"
            - name: CRAVE_BACKEND_URL
              value: "http://crave-backend.selfhealing.svc.cluster.local:8000"
            - name: CRAVE_K3S_URL
              value: "http://crave-backend.selfhealing.svc.cluster.local:8000"
            - name: RABBITMQ_HOST
              value: "niramay-rabbitmq"
            - name: REDIS_HOST
              value: "niramay-redis"
            - name: OPENSEARCH_HOST
              value: "niramay-opensearch"
            - name: TRAFFIC_GENERATOR_ENABLED
              value: "false"
            - name: HEALING_AUTO_ENABLE_ON_STARTUP
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: niramay-backend
  namespace: selfhealing
spec:
  selector:
    app: niramay-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
# Niramay frontend exposed via NodePort for browser access
apiVersion: v1
kind: Service
metadata:
  name: niramay-frontend
  namespace: selfhealing
spec:
  selector:
    app: niramay-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
  type: NodePort
