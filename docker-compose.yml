services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: food_delivery
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d food_delivery"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - selfhealing-network

  # ── Redis Cache ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crave-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - selfhealing-network

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crave-backend
    restart: unless-stopped
    environment:
      DEBUG: "true"
      POSTGRES_SERVER: crave-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: food_delivery
      REDIS_HOST: crave-redis
      REDIS_PORT: "6379"
      SECRET_KEY: "crave-super-secret-jwt-key-2024-change-in-prod"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      ALGORITHM: HS256
      CORS_ORIGINS: '["http://localhost:3001","http://localhost:3001","http://127.0.0.1:3001","http://127.0.0.1:3001"]'
      FAILURE_SIMULATOR_ENABLED: "true"
      RABBITMQ_HOST: ""
      COMPONENT_A_HEAL_ENDPOINT: ""
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # Run DB init then start the server
    command: >
      sh -c "
        echo '⏳ Waiting for DB...' &&
        python init_db.py &&
        echo '🚀 Starting backend...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - selfhealing-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crave-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: "http://crave-backend:8000"   # Resolved inside Docker network
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - selfhealing-network

  # ── Auto-Injector ────────────────────────────────────────────────────────
  crave-injector:
    build:
      context: ./injector
      dockerfile: Dockerfile
    container_name: crave-injector
    restart: unless-stopped
    environment:
      CRAVE_BACKEND_URL: "http://crave-backend:8000"
      CRAVE_DEVELOPER_EMAIL: "developer@example.com"
      CRAVE_DEVELOPER_PASSWORD: "developer123"
      REDIS_HOST: "crave-redis"
      REDIS_PORT: "6379"
      INJECT_INTERVAL_SECONDS: "120"
      SCENARIO_DURATION_SECONDS: "60"
      CRAVE_CUSTOMER_EMAIL: "customer@example.com"
      CRAVE_CUSTOMER_PASSWORD: "password123"
      TRAFFIC_INTERVAL_SECONDS: "2"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - selfhealing-network

volumes:
  postgres_data:
  redis_data:

networks:
  selfhealing-network:
    external: true
    name: selfhealing-network
